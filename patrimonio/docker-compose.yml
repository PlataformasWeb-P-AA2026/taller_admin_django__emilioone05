version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_museo
    environment:
      POSTGRES_DB: mimuseo
      POSTGRES_USER: emilio
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_museo
    environment:
      PGADMIN_DEFAULT_EMAIL: emilio@museo.com
      PGADMIN_DEFAULT_PASSWORD: 1234
    ports:
      - "5050:80"
    depends_on:
      - db